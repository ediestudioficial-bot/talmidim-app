<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>Introdução — Talmidim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Public+Sans:wght@500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100dvh;
      height: 100%;
      background: #000000;
      color: #fff;
    }
    #intro-scene {
      position: relative;
      min-height: 100dvh;
      height: 100dvh;
      width: 100%;
      overflow: hidden;
      background: #000000;
      opacity: 1;
      transition: opacity 0.6s ease;
    }
    #intro-scene.is-leaving {
      opacity: 0;
      pointer-events: none;
    }
    #particles-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
    }
    .intro-content {
      position: relative;
      z-index: 1;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(1rem, 3vh, 1.75rem);
      padding: clamp(1.25rem, 5vw, 2.5rem);
      text-align: center;
      max-width: 36rem;
      margin: 0 auto;
    }
    .intro-logo {
      height: 120px;
      width: auto;
      display: block;
      filter: brightness(1.35) contrast(1.05);
    }
    .intro-title {
      font-family: "Newsreader", Georgia, "Times New Roman", serif;
      font-style: italic;
      font-weight: 500;
      font-size: 32px;
      line-height: 1.25;
      margin: 0;
      letter-spacing: 0.01em;
    }
    @media (min-width: 640px) {
      .intro-title { font-size: 38px; }
    }
    @media (min-width: 1024px) {
      .intro-title { font-size: 44px; }
    }
    .intro-subtitle {
      font-family: "Public Sans", system-ui, sans-serif;
      font-size: clamp(1rem, 2.5vw, 1.125rem);
      line-height: 1.5;
      margin: 0;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 400;
      max-width: 28ch;
    }
    .intro-cta {
      font-family: "Public Sans", system-ui, sans-serif;
      font-weight: 600;
      font-size: 1rem;
      margin-top: clamp(0.5rem, 2vh, 1rem);
      padding: 0.9rem 1.75rem;
      border: none;
      border-radius: 30px;
      background: #C8A84B;
      color: #1a1a1a;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.2s ease, filter 0.2s ease;
    }
    .intro-cta:hover {
      filter: brightness(1.08);
    }
    .intro-cta:active {
      transform: scale(0.98);
    }
    .intro-cta:focus-visible {
      outline: 2px solid rgba(200, 168, 75, 0.8);
      outline-offset: 3px;
    }
    .intro-cta:disabled {
      cursor: wait;
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div id="intro-scene" class="intro-scene">
    <canvas id="particles-canvas" aria-hidden="true"></canvas>
    <main class="intro-content">
      <img class="intro-logo" src="../assets/logo.png" alt="Talmidim" style="height:120px;" width="525" height="150" decoding="async">
      <h1 class="intro-title">Você sabe quem você realmente é?</h1>
      <p class="intro-subtitle">Antes de caminhar, é preciso saber de onde você parte.</p>
      <button type="button" class="intro-cta" id="intro-discover">Descobrir minha realidade</button>
    </main>
  </div>

  <script>
    (function () {
      var canvas = document.getElementById("particles-canvas");
      var ctx = canvas.getContext("2d");
      var dpr = Math.min(window.devicePixelRatio || 1, 2);
      var particles = [];
      var COUNT = 60;
      var GOLD = "#C8A84B";
      var running = true;

      function resize() {
        var w = window.innerWidth;
        var h = window.innerHeight;
        canvas.width = Math.floor(w * dpr);
        canvas.height = Math.floor(h * dpr);
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function random(min, max) {
        return min + Math.random() * (max - min);
      }

      function initParticles() {
        particles.length = 0;
        var w = window.innerWidth;
        var h = window.innerHeight;
        for (var i = 0; i < COUNT; i++) {
          particles.push({
            x: random(0, w),
            y: random(h * 0.55, h + 40),
            r: random(2, 4),
            speed: random(0.15, 0.55),
            opacity: random(0.1, 0.6),
            gold: Math.random() < 0.22
          });
        }
      }

      function tick() {
        if (!running) return;
        var w = window.innerWidth;
        var h = window.innerHeight;
        ctx.clearRect(0, 0, w, h);
        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.y -= p.speed;
          if (p.y < -p.r * 2) {
            p.y = h + random(0, h * 0.25);
            p.x = random(0, w);
            p.opacity = random(0.1, 0.6);
            p.r = random(2, 4);
            p.speed = random(0.15, 0.55);
            p.gold = Math.random() < 0.22;
          }
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.gold
            ? "rgba(200, 168, 75, " + p.opacity + ")"
            : "rgba(255, 255, 255, " + p.opacity + ")";
          ctx.fill();
        }
        requestAnimationFrame(tick);
      }

      resize();
      initParticles();
      window.addEventListener("resize", function () {
        resize();
        initParticles();
      });
      requestAnimationFrame(tick);

      var scene = document.getElementById("intro-scene");
      var btn = document.getElementById("intro-discover");
      var target = "radar.html";

      btn.addEventListener("click", function () {
        if (btn.disabled) return;
        btn.disabled = true;
        running = false;
        scene.classList.add("is-leaving");
        window.setTimeout(function () {
          window.location.href = target;
        }, 600);
      });
    })();
  </script>
</body>
</html>
