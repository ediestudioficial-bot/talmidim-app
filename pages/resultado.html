<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fcf9ef">
  <title>Resultado — Radar Discipular | Talmidim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/radar.css">
  <link rel="stylesheet" href="../css/resultado.css">
</head>
<body class="radar-page resultado-page">
  <header class="radar-header">
    <div class="radar-header-inner">
      <a href="../index.html" class="radar-header-brand" aria-label="Talmidim — início">
        <img class="radar-header-logo" src="../assets/logo.png" alt="Talmidim" style="height:120px;" width="525" height="150" decoding="async">
      </a>
      <span class="material-symbols-outlined radar-header-icon" aria-hidden="true">analytics</span>
    </div>
  </header>

  <main class="resultado-main">
    <div id="resultado-fase1">
      <h1 class="resultado-titulo">Essa é a realidade da sua vida com Deus hoje.</h1>
      <p class="resultado-subtitulo">Você respondeu com base no que viveu.
Isso revela onde sua vida realmente está.</p>

      <div class="resultado-chart-wrap">
        <canvas id="radar-resultado-chart" width="320" height="320" aria-label="Gráfico radar por área do discipulado"></canvas>
      </div>

      <ul class="resultado-areas" id="resultado-areas"></ul>

      <div class="resultado-cta-wrap">
        <button type="button" class="resultado-cta" id="resultado-continuar-resultados">
          Continuar
        </button>
      </div>
    </div>

    <div id="resultado-ponte" class="resultado-ponte" hidden>
      <p class="resultado-ponte-texto">Você viu sua realidade.</p>
      <p class="resultado-ponte-texto">Agora precisa decidir o que vai fazer com ela.</p>
      <div class="resultado-cta-wrap">
        <button type="button" class="resultado-cta" id="resultado-definir-passo">
          Definir meu próximo passo
        </button>
      </div>
    </div>
  </main>

  <script src="../js/radar-chart.js"></script>
  <script src="../js/resultado.js"></script>
</body>
</html>
