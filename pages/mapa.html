<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f2840">
  <title>Mapa da jornada — Talmidim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/mapa.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script>
    (function () {
      try {
        if (localStorage.getItem("talmidim_radar_done") !== "true") {
          window.location.replace("radar.html");
        }
      } catch (e) {
        window.location.replace("radar.html");
      }
    })();
  </script>
</head>
<body class="mapa-page">
  <div id="mapa-container">
    <div class="mapa-live-wrap">
      <div class="mapa-live-breathe">
        <img
          class="mapa-bg"
          src="../assets/mapa-novo.png"
          alt=""
        >
      </div>
    </div>
    <div id="nevoa" aria-hidden="true"></div>
    <div class="mapa-logo-float">
      <img src="../assets/logo.png" alt="Talmidim" width="525" height="150" decoding="async">
    </div>
    <canvas id="peregrino-canvas" aria-hidden="true"></canvas>
    <div class="mapa-markers" id="mapa-markers" aria-label="Estações da jornada"></div>
    <div class="mapa-painel">
      <p class="mapa-badge" id="mapa-badge">Dia 1 de 47</p>
      <div class="mapa-ctx" id="mapa-ctx" hidden></div>
      <button type="button" class="mapa-cta" id="mapa-cta">
        Continuar jornada
      </button>
    </div>
  </div>

  <script type="module" src="../js/mapa-peregrino-3d.js"></script>
  <script src="../js/mapa-ui.js"></script>
  <script src="../js/mapa.js"></script>
</body>
</html>
