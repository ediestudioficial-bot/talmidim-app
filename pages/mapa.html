<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a2833">
  <title>Mapa da jornada — Talmidim</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/mapa-peregrino.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script>
    (function () {
      try {
        if (localStorage.getItem("talmidim_radar_done") !== "true") {
          window.location.replace("radar.html");
        }
      } catch (e) {
        window.location.replace("radar.html");
      }
    })();
  </script>
</head>
<body class="mapa-peregrino-page">
  <script>
    (function () {
      try {
        if (localStorage.getItem("talmidim_mapa_intro_vista") !== "true") {
          document.body.classList.add("mapa-jornada-intro");
        }
      } catch (e) {
        document.body.classList.add("mapa-jornada-intro");
      }
    })();
  </script>
  <div
    class="mapa-peregrino-stage"
    id="mapa-peregrino-stage"
    role="img"
    aria-label="Caminho da jornada de discipulado"
  >
    <div class="mapa-camera" id="mapa-camera">
      <div class="mapa-mundo" id="mapa-mundo">
        <div class="mapa-mundo-inner">
          <div class="mapa-live-wrap">
            <div class="mapa-live-breathe">
              <img
                class="mapa-peregrino-bg mapa-bg"
                src="../assets/mapa.png"
                alt=""
              >
            </div>
          </div>
          <div class="mapa-capela-luz" aria-hidden="true"></div>
        </div>
      </div>
      <div id="nevoa" class="mapa-nevoa" aria-hidden="true"></div>
      <div id="sombra-peregrino" class="mapa-sombra-peregrino" aria-hidden="true"></div>
      <div class="mapa-particulas" aria-hidden="true">
        <span class="mapa-particula mapa-particula--1"></span>
        <span class="mapa-particula mapa-particula--2"></span>
        <span class="mapa-particula mapa-particula--3"></span>
      </div>
      <div class="mapa-vignette" aria-hidden="true"></div>
      <img
        class="mapa-peregrino-img"
        id="mapa-peregrino-img"
        src="../assets/peregrino.svg"
        width="56"
        height="72"
        alt=""
      >
      <p class="mapa-peregrino-dia" id="mapa-peregrino-dia">Dia 1 de 47</p>
      <button type="button" class="mapa-peregrino-continuar" id="mapa-peregrino-continuar">
        Continuar jornada
      </button>
      <div class="mapa-intro-overlay" id="mapa-intro-overlay">
        <div class="mapa-intro-media" aria-hidden="true">
          <img class="mapa-intro-map-blur" src="../assets/mapa.png" alt="">
        </div>
        <div class="mapa-intro-scrim" aria-hidden="true"></div>
        <div class="mapa-intro-panel">
          <p class="mapa-intro-texto">A caminhada começa onde você decide obedecer.</p>
          <button type="button" class="mapa-intro-cta" id="mapa-intro-comecar">
            Dar o Primeiro Passo
          </button>
        </div>
      </div>
    </div>
    <div id="mapa-avatar-3d" aria-hidden="true"></div>
  </div>

  <script src="../js/mapa-peregrino.js"></script>
  <script src="../js/mapa.js"></script>
  <script type="module" src="../js/avatar-3d.js"></script>
</body>
</html>
