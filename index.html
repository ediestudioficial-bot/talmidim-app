<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Talmidim — A Jornada do Discipulado. Progressive Web App de discipulado cristão.">
  <meta name="theme-color" content="#C8A84B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Talmidim">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Talmidim">
  <meta name="msapplication-TileColor" content="#0f2840">
  <meta name="msapplication-navbutton-color" content="#C8A84B">

  <title>Talmidim — A Jornada do Discipulado</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/mapa.css">
</head>
<body>
  <header class="app-header" role="banner">
    <img id="logo" src="assets/logo.png" alt="Talmidim">
  </header>

  <div id="mapa-container" role="application" aria-label="Mapa da jornada">
    <img class="mapa-bg" src="assets/mapa.png" alt="Mapa da jornada do discipulado">

    <div class="mapa-overlay-inferior" aria-hidden="true"></div>

    <div class="mapa-markers">
      <button
        type="button"
        class="mapa-marker mapa-marker--desbloqueada"
        style="left:18%; top:58%"
        data-nome="Estação 1: Intimidade com Deus"
        aria-label="Estação 1: Intimidade com Deus, desbloqueada"
      ></button>
      <span
        class="mapa-marker mapa-marker--bloqueada"
        style="left:34%; top:52%"
        role="presentation"
        aria-hidden="true"
      ></span>
      <span
        class="mapa-marker mapa-marker--bloqueada"
        style="left:36%; top:66%"
        role="presentation"
        aria-hidden="true"
      ></span>
      <span
        class="mapa-marker mapa-marker--bloqueada"
        style="left:49%; top:68%"
        role="presentation"
        aria-hidden="true"
      ></span>
      <span
        class="mapa-marker mapa-marker--bloqueada"
        style="left:60%; top:58%"
        role="presentation"
        aria-hidden="true"
      ></span>
      <span
        class="mapa-marker mapa-marker--bloqueada"
        style="left:72%; top:42%"
        role="presentation"
        aria-hidden="true"
      ></span>
      <span
        class="mapa-marker mapa-marker--bloqueada"
        style="left:80%; top:60%"
        role="presentation"
        aria-hidden="true"
      ></span>
    </div>

    <div class="mapa-card" id="mapa-card" role="dialog" aria-modal="true" aria-labelledby="mapa-card-titulo" hidden>
      <button type="button" class="mapa-card-fechar" id="mapa-card-fechar" aria-label="Fechar">&times;</button>
      <p class="mapa-card-titulo" id="mapa-card-titulo"></p>
    </div>

    <div class="mapa-painel">
      <p class="mapa-badge">Dia 1 de 147 — Estação 1: Intimidade com Deus</p>
      <button type="button" class="mapa-cta" id="iniciar-jornada">Iniciar Jornada</button>
    </div>
  </div>

  <script>
    (function () {
      var card = document.getElementById("mapa-card");
      var titulo = document.getElementById("mapa-card-titulo");
      var fechar = document.getElementById("mapa-card-fechar");
      var desbloqueados = document.querySelectorAll(".mapa-marker--desbloqueada");

      function posicionarCard(el, marker) {
        var r = marker.getBoundingClientRect();
        var cx = r.left + r.width / 2;
        var top = r.top - 12;
        el.style.left = cx + "px";
        el.style.top = top + "px";
        el.style.transform = "translate(-50%, -100%)";
      }

      function abrirCard(marker) {
        var nome = marker.getAttribute("data-nome") || "";
        titulo.textContent = nome;
        card.hidden = false;
        posicionarCard(card, marker);
      }

      function fecharCard() {
        card.hidden = true;
        titulo.textContent = "";
      }

      desbloqueados.forEach(function (m) {
        m.addEventListener("click", function () {
          abrirCard(m);
        });
      });

      fechar.addEventListener("click", fecharCard);

      window.addEventListener("resize", function () {
        if (!card.hidden && desbloqueados.length) {
          posicionarCard(card, desbloqueados[0]);
        }
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && !card.hidden) {
          fecharCard();
        }
      });

      var btnJornada = document.getElementById("iniciar-jornada");
      if (btnJornada) {
        btnJornada.addEventListener("click", function () {
          window.location.href = "/pages/radar.html";
        });
      }
    })();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("sw.js", { scope: "./" })
          .then(function (reg) {
            console.log("Service Worker registrado:", reg.scope);
          })
          .catch(function (err) {
            console.warn("Falha ao registrar Service Worker:", err);
          });
      });
    }
  </script>
</body>
</html>
