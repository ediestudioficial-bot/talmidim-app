<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Talmidim — A Jornada do Discipulado. Progressive Web App de discipulado cristão.">
  <meta name="theme-color" content="#C8A84B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Talmidim">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Talmidim">
  <meta name="msapplication-TileColor" content="#0f2840">
  <meta name="msapplication-navbutton-color" content="#C8A84B">

  <title>Talmidim — A Jornada do Discipulado</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      min-height: 100dvh;
    }

    body {
      font-family: "Montserrat", system-ui, sans-serif;
      background-color: #0f2840;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .app-header {
      background-color: #ffffff;
      padding: 16px;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .app-header #logo {
      max-width: 200px;
      width: auto;
      height: auto;
      display: block;
    }

    .app-main {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 1.25rem 1.25rem 1rem;
      gap: 0.75rem;
    }

    #canvas-container {
      flex: 1;
      min-height: 0;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    #canvas-container canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }

    .mapa-status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      text-align: center;
      font-size: 1rem;
      font-weight: 700;
      color: #c8a84b;
      background: rgba(15, 40, 64, 0.85);
      z-index: 1;
      pointer-events: none;
    }

    .mapa-status--error {
      color: #ffb4a8;
    }

    .app-main .title {
      font-size: clamp(2.25rem, 8vw, 3.5rem);
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .app-main .subtitle {
      font-size: clamp(1rem, 3.5vw, 1.35rem);
      font-weight: 700;
      color: #C8A84B;
      max-width: 22em;
      line-height: 1.35;
    }
  </style>
</head>
<body>
  <header class="app-header" role="banner">
    <img id="logo" src="assets/logo.png" alt="Talmidim" style="height:90px; width:auto; display:block; margin:0 auto;">
  </header>

  <main class="app-main" role="main">
    <h1 class="title">Talmidim</h1>
    <p class="subtitle">A Jornada do Discipulado</p>
  </main>

  <div id="canvas-container" aria-label="Visualização 3D do Peregrino"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>

  <script type="module" src="js/mapa.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("sw.js", { scope: "./" })
          .then(function (reg) {
            console.log("Service Worker registrado:", reg.scope);
          })
          .catch(function (err) {
            console.warn("Falha ao registrar Service Worker:", err);
          });
      });
    }
  </script>
</body>
</html>
