<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Talmidim — A Jornada do Discipulado. Progressive Web App de discipulado cristão.">
  <meta name="theme-color" content="#C8A84B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Talmidim">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Talmidim">
  <meta name="msapplication-TileColor" content="#0f2840">
  <meta name="msapplication-navbutton-color" content="#C8A84B">

  <title>Talmidim — A Jornada do Discipulado</title>

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-512.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/home.css">
  <script>
    (function () {
      try {
        if (localStorage.getItem("talmidim_radar_done") !== "true") {
          window.location.replace("pages/radar.html");
        }
      } catch (e) {
        window.location.replace("pages/radar.html");
      }
    })();
  </script>
</head>
<body class="talmidim-home">
  <div class="talmidim-home-logo" role="banner">
    <img id="logo" src="assets/logo.png" alt="Talmidim">
  </div>

  <main class="talmidim-home-main">
    <p class="talmidim-home-resumo" id="talmidim-home-resumo"></p>
    <a class="talmidim-home-cta" href="pages/mapa.html">Abrir mapa da jornada</a>
  </main>

  <script>
    (function () {
      var el = document.getElementById("talmidim-home-resumo");
      if (!el) {
        return;
      }
      var pdd = null;
      var j = null;
      try {
        var pr = localStorage.getItem("talmidim_pdd");
        if (pr) {
          pdd = JSON.parse(pr);
        }
      } catch (e) {}
      try {
        var jr = localStorage.getItem("talmidim_jornada");
        if (jr) {
          j = JSON.parse(jr);
        }
      } catch (e) {}
      var dia = 1;
      if (j && typeof j.diaAtual === "number" && j.diaAtual >= 1) {
        dia = j.diaAtual;
      }
      var temPdd =
        pdd && typeof pdd.area === "string" && typeof pdd.acao === "string";
      if (dia > 47) {
        el.textContent =
          "Sua sequência de 47 dias está completa. O mapa mostra toda a trilha.";
      } else if (temPdd) {
        el.textContent =
          "Dia " +
          dia +
          " de 47 · " +
          pdd.area +
          " — " +
          (pdd.acao.length > 80 ? pdd.acao.slice(0, 77) + "…" : pdd.acao);
      } else {
        el.textContent =
          "Sua jornada acontece no mapa: um passo por dia, com clareza.";
      }
    })();
  </script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("sw.js", { scope: "./" })
          .then(function (reg) {
            console.log("Service Worker registrado:", reg.scope);
          })
          .catch(function (err) {
            console.warn("Falha ao registrar Service Worker:", err);
          });
      });
    }
  </script>
</body>
</html>
